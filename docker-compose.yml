# YNOT London — local + production container stack.
# Profiles:
#   dev        — postgres + redis bound to the host on 5432/6379 so `pnpm dev`
#                and Prisma CLI on the host can reach them
#   prod       — postgres + redis + worker. App + Caddy come from
#                docker-compose.prod.yml (which also drops postgres/redis host
#                port bindings via `!reset []`).
#   __never__  — used to neuter the legacy app/nginx stubs without deleting them
#                (they were Phase 5 placeholders; Phase 8 replaces them with the
#                real ghcr.io image and Caddy reverse proxy in the prod override).

name: ynot

services:
  postgres:
    image: postgres:16-alpine
    profiles: ["dev", "prod"]
    container_name: ynot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ynot
      POSTGRES_PASSWORD: ynot_dev_password
      POSTGRES_DB: ynot_dev
    ports:
      # WARNING: bound to 0.0.0.0 in dev for host access. Phase "Deploy & Ops"
      # MUST switch this to "127.0.0.1:5432:5432" or remove entirely for prod.
      - "5432:5432"
    volumes:
      - ynot_postgres_data:/var/lib/postgresql/data
      - ./prisma/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ynot -d ynot_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: ["dev", "prod"]
    container_name: ynot-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      # WARNING: same as postgres above — Deploy & Ops switches this to
      # "127.0.0.1:6379:6379" or removes it for prod.
      - "6379:6379"
    volumes:
      - ynot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    # Phase 8 — replaced in prod by the Next.js standalone image from
    # ghcr.io/batrbekk/ynot-app (see docker-compose.prod.yml).
    # `__never__` is a profile no command ever passes, so this stub is
    # silently ignored. Kept for git-history continuity, NOT for runtime.
    image: node:22-alpine
    profiles: ["__never__"]

  nginx:
    # Phase 8 — replaced in prod by Caddy (see docker-compose.prod.yml).
    # Same `__never__` trick: the stanza never runs but the diff stays small.
    image: nginx:1.27-alpine
    profiles: ["__never__"]

  ynot-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    profiles: ["prod"]
    container_name: ynot-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - WORKER_ENABLED=${WORKER_ENABLED:-true}
    env_file:
      - path: .env.local
        required: false
    volumes:
      - ynot-labels:/var/lib/ynot/labels

volumes:
  ynot_postgres_data:
  ynot_redis_data:
  ynot-labels:
  ynot-media:
