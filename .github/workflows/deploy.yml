name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Required so cache-to: type=gha works (default docker driver doesn't
        # support cache export — only the docker-container driver does).

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Use the workflow's auto-issued GITHUB_TOKEN — has the
          # `packages: write` scope we declared above and is scoped to
          # this exact repo. Avoids fine-grained PAT scope mismatches.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: |
            ghcr.io/zhansaya-ynot/ynot-app:${{ steps.meta.outputs.tag }}
            ghcr.io/zhansaya-ynot/ynot-app:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY || 'pk_test_build_stub' }}

      - name: Build + push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          tags: |
            ghcr.io/zhansaya-ynot/ynot-worker:${{ steps.meta.outputs.tag }}
            ghcr.io/zhansaya-ynot/ynot-worker:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH agent setup
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" \
            "GHCR_PAT='$GHCR_PAT' IMAGE_TAG='$IMAGE_TAG' bash -s" <<'EOF'
            set -euo pipefail
            # Login to ghcr.io so pulls work whether packages are public or private.
            echo "$GHCR_PAT" | docker login ghcr.io -u zhansaya-ynot --password-stdin
            # Reclaim ownership in case a previous interactive `sudo` step
            # (manual fix from another user) left files we can't write to.
            # The deploy SSH user must own /srv/ynot end-to-end so git fetch
            # can update FETCH_HEAD. -n means don't fail if already correct.
            sudo -n chown -R "$(id -un):$(id -gn)" /srv/ynot 2>/dev/null || true
            # Git refuses to operate on a repo whose ownership doesn't match
            # the current user — whitelist /srv/ynot so the fetch always
            # succeeds regardless of who chowned last.
            git config --global --add safe.directory /srv/ynot
            cd /srv/ynot
            git fetch origin main
            git reset --hard origin/main
            export IMAGE_TAG="$IMAGE_TAG"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile prod pull
            # `</dev/null` is mandatory: without it `compose run` attaches our
            # heredoc stdin to the migrate container, which then eats every
            # subsequent line of this script. That's why prior deploys silently
            # stopped after migrate — rm/up/health check never ran, GHA reported
            # success because set -e didn't trip, container kept running the
            # previous image.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile prod run --rm -T app sh -c "npx prisma migrate deploy" </dev/null
            # Belt-and-braces: explicitly stop+remove so up -d cannot decide
            # the container is already correct. Two prior deploys silently
            # left old containers running despite --force-recreate (cause
            # never identified — possibly compose comparing image digests
            # via a mirror that lagged). Removing first guarantees recreate.
            echo "==> stopping old app/worker containers if any"
            docker rm -f ynot-app ynot-worker 2>/dev/null || true
            echo "==> bringing up new containers (image tag: $IMAGE_TAG)"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile prod up -d --no-deps --force-recreate --remove-orphans app ynot-worker caddy
            echo "==> running containers:"
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
            sleep 15
            # Hit the app container directly instead of going through Caddy.
            # Caddy 308-redirects port 80 → 443 and serves the staging.ynotlondon.com
            # cert, which curl rejects when targeting localhost ("tlsv1 alert
            # internal error"). Bypassing Caddy here checks the app process
            # itself, which is what we actually care about post-deploy.
            docker exec ynot-app curl -fs --max-time 10 http://localhost:3000/api/health
            # Reclaim disk: every build pushes ~2.7GB of new layers (app +
            # worker). Without aggressive prune the VPS hit 22GB used after
            # only 4 back-to-back deploys (each SHA-tagged pair is preserved).
            # `prune -af` (no until filter) removes every image not referenced
            # by a running container — that's the previous deploy's :latest +
            # any SHA-tagged copies. Rollback to a previous version is still
            # possible via `git revert` + redeploy; we never roll back by
            # docker-tag-pinning, so retaining old tags has zero value.
            # Volumes are explicitly excluded.
            docker image prune -af || true
          EOF
