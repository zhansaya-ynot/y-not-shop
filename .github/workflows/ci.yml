name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ynot
          POSTGRES_PASSWORD: ynot_test_password
          POSTGRES_DB: ynot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ynot"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up test env
        run: |
          cp .env.example .env.test
          sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql://ynot:ynot_test_password@localhost:5432/ynot_test?schema=public|' .env.test

      - name: Apply migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://ynot:ynot_test_password@localhost:5432/ynot_test?schema=public

      - run: pnpm typecheck
      - run: pnpm lint
      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://ynot:ynot_test_password@localhost:5432/ynot_test?schema=public
          REDIS_URL: redis://localhost:6379

      - name: Build
        run: pnpm build
        env:
          BUILD_PROD: '1'
