name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ynot
          POSTGRES_PASSWORD: ynot_test_password
          POSTGRES_DB: ynot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ynot"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up test env
        run: |
          cp .env.example .env.test
          sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql://ynot:ynot_test_password@localhost:5432/ynot_test?schema=public|' .env.test

      - name: Apply migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://ynot:ynot_test_password@localhost:5432/ynot_test?schema=public

      # Build first — Next.js 16 typed routes generates `.next/types/routes.d.ts`
      # which `next-env.d.ts` references. Without it, typecheck fails to resolve
      # PNG imports + route types. Build is fast (~30s) thanks to no test data.
      #
      # BUILD_PROD short-circuits the env validator, but several SDK clients
      # (Stripe, NextAuth) construct at module-load time and crash on missing
      # config. Mirror the Dockerfile builder stage's stub envs so page-data
      # collection completes cleanly. Runtime gets real values from
      # /etc/ynot/secrets.env (production) or .env.local (dev).
      - name: Build
        run: pnpm build
        env:
          BUILD_PROD: '1'
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: '1'
          STRIPE_SECRET_KEY: sk_test_build_stub
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_build_stub
          STRIPE_WEBHOOK_SECRET: whsec_build_stub
          NEXTAUTH_SECRET: build_stub_nextauth_secret_at_least_32_chars_long
          ORDER_TOKEN_SECRET: build_stub_order_token_secret_at_least_32_chars
          NEXT_PUBLIC_SITE_URL: https://ynotlondon.com
          DATABASE_URL: postgresql://stub:stub@buildonly:5432/stub
          REDIS_URL: redis://buildonly:6379

      - run: pnpm typecheck
      - run: pnpm lint
      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://ynot:ynot_test_password@localhost:5432/ynot_test?schema=public
          REDIS_URL: redis://localhost:6379
